server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Assets con hash → archivo real, sin fallback HTML
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html → siempre fresco en cada deploy
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Rutas de la SPA → fallback a index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
